<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mesajlar — İştek</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--primary:#E53935;--bg:#F8FAFC;--surface:#fff;--text:#1A1A2E;--muted:#6B7280;--border:#E5E7EB;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;}
.header a{color:var(--primary);text-decoration:none;font-size:14px;}
.header h2{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;}
.chat-layout{display:grid;grid-template-columns:280px 1fr;flex:1;overflow:hidden;}
/* Konuşma listesi */
.konusma-panel{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;}
.konusma-head{padding:16px;font-family:'Sora',sans-serif;font-weight:700;font-size:15px;border-bottom:1px solid var(--border);}
.konusma-row{padding:14px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);}
.konusma-row:hover,.konusma-row.aktif{background:#FFF5F5;}
.k-ad{font-weight:600;font-size:14px;margin-bottom:2px;display:flex;align-items:center;justify-content:space-between;}
.k-son{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.k-badge{background:var(--primary);color:white;font-size:10px;padding:2px 6px;border-radius:100px;font-weight:700;}
/* Mesaj alanı */
.mesaj-panel{display:flex;flex-direction:column;overflow:hidden;}
.mesaj-header{padding:16px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.m-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#FF6F00);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
.m-ad{font-weight:700;font-size:15px;}
.m-rol{font-size:12px;color:var(--muted);}
.mesaj-liste{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;}
.bos-chat{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);}
.bos-chat .ikon{font-size:48px;margin-bottom:12px;}
.baloncuk-wrap{display:flex;gap:8px;align-items:flex-end;}
.baloncuk-wrap.benim{flex-direction:row-reverse;}
.baloncuk-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#FF6F00);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.baloncuk{max-width:420px;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;}
.baloncuk.diger{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text);}
.baloncuk.benim{background:var(--primary);color:white;border-bottom-right-radius:4px;}
.baloncuk-tarih{font-size:10px;color:var(--muted);margin-top:4px;text-align:right;}
.benim .baloncuk-tarih{text-align:left;}
/* Input */
.mesaj-input{padding:16px 20px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;}
.mesaj-input textarea{flex:1;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;font-family:'DM Sans',sans-serif;resize:none;outline:none;max-height:120px;transition:border-color .2s;}
.mesaj-input textarea:focus{border-color:var(--primary);}
.btn-gonder{padding:12px 20px;background:var(--primary);color:white;border:none;border-radius:var(--r);font-family:'Sora',sans-serif;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-gonder:hover{background:#B71C1C;}
.bos-secim{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:15px;gap:12px;}
</style>
</head>
<body>

<div class="header">
  <a href="/dashboard">← Dashboard</a>
  <h2>💬 Mesajlar</h2>
</div>

<div class="chat-layout">
  <!-- Konuşmalar -->
  <div class="konusma-panel">
    <div class="konusma-head">Konuşmalar</div>
    <div id="konusma-liste"></div>
  </div>

  <!-- Mesajlar -->
  <div class="mesaj-panel" id="mesaj-panel">
    <div class="bos-secim">
      <div style="font-size:48px">💬</div>
      <div>Bir konuşma seçin</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<script>
const KULLANICI_ID = "{{ kullanici_id }}";
const KULLANICI_AD = "{{ kullanici_ad }}";
const HEDEF_ID     = "{{ hedef_id }}";

let socket, aktifHedef = null, aktifHedefAd = '';

// Socket.IO bağlantısı
socket = io();
socket.emit('oda_katil', {kullanici_id: KULLANICI_ID});

socket.on('mesaj_al', (msg) => {
  if (aktifHedef && (msg.gonderen_id === aktifHedef || msg.alici_id === aktifHedef)) {
    ekleBaloncuk(msg);
    kaydirAsagi();
    if (!msg.benim) {
      socket.emit('okundu_isaretle', {gonderen_id: aktifHedef, alici_id: KULLANICI_ID});
    }
  }
  yukleKonusmalar();
});

async function yukleKonusmalar() {
  const res  = await fetch('/chat/konusmalar');
  const rows = await res.json();
  document.getElementById('konusma-liste').innerHTML = rows.length
    ? rows.map(r => `
        <div class="konusma-row ${aktifHedef===r.id?'aktif':''}" onclick="secKonusma('${r.id}','${r.ad_soyad.replace(/'/g,"\\'")}','${r.rol}')">
          <div class="k-ad">
            <span>${r.ad_soyad}</span>
            ${r.okunmamis>0 ? `<span class="k-badge">${r.okunmamis}</span>` : ''}
          </div>
          <div class="k-son">${r.son_mesaj||'Mesaj yok'}</div>
        </div>`).join('')
    : '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Henüz konuşma yok</div>';
}

async function secKonusma(hedefId, hedefAd, hedefRol) {
  aktifHedef   = hedefId;
  aktifHedefAd = hedefAd;

  document.querySelectorAll('.konusma-row').forEach(r => r.classList.remove('aktif'));
  event?.currentTarget?.classList.add('aktif');

  const panel = document.getElementById('mesaj-panel');
  panel.innerHTML = `
    <div class="mesaj-header">
      <div class="m-avatar">${hedefAd[0]}</div>
      <div><div class="m-ad">${hedefAd}</div><div class="m-rol">${hedefRol==='uzman'?'Uzman':'Müşteri'}</div></div>
    </div>
    <div class="mesaj-liste" id="mesaj-liste"></div>
    <div class="mesaj-input">
      <textarea id="mesaj-input" rows="1" placeholder="Mesaj yazın..." onkeydown="enterGonder(event)"></textarea>
      <button class="btn-gonder" onclick="mesajGonder()">Gönder →</button>
    </div>`;

  const res   = await fetch(`/chat/mesajlar/${hedefId}`);
  const mesaj = await res.json();
  const liste = document.getElementById('mesaj-liste');

  if (mesaj.length) {
    liste.innerHTML = mesaj.map(m => baloncukHtml(m)).join('');
  } else {
    liste.innerHTML = '<div class="bos-chat"><div class="ikon">👋</div><p>Konuşma başlamadı. İlk mesajı siz gönderin!</p></div>';
  }
  kaydirAsagi();
}

function baloncukHtml(m) {
  const benim = m.benim || m.gonderen_id === KULLANICI_ID;
  return `
    <div class="baloncuk-wrap ${benim?'benim':''}">
      <div class="baloncuk-avatar">${(m.gonderen_ad||'?')[0]}</div>
      <div>
        <div class="baloncuk ${benim?'benim':'diger'}">${escHtml(m.metin)}</div>
        <div class="baloncuk-tarih">${m.tarih?.slice(11,16)||''}</div>
      </div>
    </div>`;
}

function ekleBaloncuk(m) {
  const liste = document.getElementById('mesaj-liste');
  if (!liste) return;
  const bos = liste.querySelector('.bos-chat');
  if (bos) liste.innerHTML = '';
  const div = document.createElement('div');
  div.innerHTML = baloncukHtml(m);
  liste.appendChild(div.firstElementChild);
}

async function mesajGonder() {
  if (!aktifHedef) return;
  const ta   = document.getElementById('mesaj-input');
  const metin = ta.value.trim();
  if (!metin) return;
  ta.value = '';
  ta.style.height = 'auto';

  socket.emit('mesaj_gonder', {
    gonderen_id: KULLANICI_ID,
    alici_id:    aktifHedef,
    metin,
  });
}

function enterGonder(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); mesajGonder(); }
}

function kaydirAsagi() {
  const l = document.getElementById('mesaj-liste');
  if (l) l.scrollTop = l.scrollHeight;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Textarea otomatik yükseklik
document.addEventListener('input', e => {
  if (e.target.id==='mesaj-input') {
    e.target.style.height='auto';
    e.target.style.height=Math.min(e.target.scrollHeight,120)+'px';
  }
});

// Başlangıç
yukleKonusmalar();
if (HEDEF_ID) {
  setTimeout(() => secKonusma(HEDEF_ID, HEDEF_ID, ''), 300);
}
</script>
</body>
</html>
